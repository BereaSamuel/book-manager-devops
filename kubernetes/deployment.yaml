apiVersion: apps/v1
kind: Deployment

metadata:
  name: book-manager

spec:
  replicas: 1

  selector:
    matchLabels:
      app: book-manager

  template:
    metadata:
      labels:
        app: book-manager

    spec:
      containers:
        - name: book-manager
          image: book-manager:2.0
          imagePullPolicy: Never

          ports:
            - containerPort: 5000

          env:
            - name: DB_HOST
              value: "host.minikube.internal"
            - name: DB_PORT
              value: "3306"
            - name: DB_NAME
              value: "book_manager"
            - name: DB_USER
              value: "bookuser"
            - name: DB_PASSWORD
              value: "bookpass"