<!DOCTYPE html>
<html>
<head>
    <title>Book Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>📚 Book Manager</h1>

    <form action="/add" method="POST">

        <input
            type="text"
            name="title"
            placeholder="Book Title"
            required>

        <input
            type="text"
            name="author"
            placeholder="Author"
            required>

        <button type="submit">
            Add Book
        </button>

    </form>

    <hr>

    <h2>Books</h2>

   <ul>

{% for book in books %}

<li>

    {{ book.title }} - {{ book.author }}

    <a href="/edit/{{ book.id }}">
        Edit
    </a>

    <a href="/delete/{{ book.id }}">
        Delete
    </a>

</li>

{% endfor %}

</ul>

    <p>
        <strong>Total Books:</strong>
        {{ books|length }}
    </p>

</div>

</body>
</html>
