<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Edit Book</h1>

    <form action="/update/{{ book.id }}" method="POST">

        <input
            type="text"
            name="title"
            value="{{ book.title }}"
            required>

        <input
            type="text"
            name="author"
            value="{{ book.author }}"
            required>

        <button type="submit">
            Save Changes
        </button>

    </form>

</div>

</body>
</html>
